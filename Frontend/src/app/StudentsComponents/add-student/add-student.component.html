<div class="container mt-5">
  <div class="card shadow p-4 mx-auto" style="max-width: 400px;">

    <h3 class="text-center mb-3">Add Student</h3>


    <input type="text"
       [(ngModel)]="student.phone"
       class="form-control mb-2"
       placeholder="Phone">

    <select
        [(ngModel)]="student.facultyname"
        class="form-select mb-2"
        name = "faculty">
        <option value="" disabled>Select Faculty</option>
        <option *ngFor="let f of faculties"
                [value]="f.facultyname">
            {{ f.facultyname }}
        </option>
    </select>

    <input type="number"
       [(ngModel)]="student.levelid"
       class="form-control mb-3"
       placeholder="Student Level">

    <button class="btn btn-primary w-100" (click)="addStudent()">Add Student</button>

  </div>
</div>
