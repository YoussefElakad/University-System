<div class="page">

  <h2 class="title">Doctors</h2>

  <!-- ------------------------------------ -->
<!-- Filters + Add Button-->
<div class="d-flex justify-content-center align-items-center gap-3 mb-3">
<!-- Doctor Filter -->
  <div class="d-flex justify-content-center mb-3">
  <div style="width: 300px;">
    <input
      type="text"
      class="form-control student-search"
      placeholder="Search by doctor name..."
      [(ngModel)]="doctorfilter"
      (ngModelChange)="currentPage = 1">
  </div>
</div>
<!-- Doctor Filter -->

<!-- Add Button -->
   <div class="d-flex justify-content-center mb-3">
  <div style="width: 50px;">
    <button
      class="btn btn-outline-success btn-sm"
      placeholder="Search by student name..."
      routerLink="/Docs/Add">
      <i class="bi bi-plus"></i>
    </button>
  </div>
</div>
<!-- Add Button -->
</div>
<!-- Filters + Add Button-->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Doctor Table -->
  <div class="table-wrapper">

    <table class="table">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Code</th>
          <th>Name</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let d of paginatedDocs; let i = index">
          <td>{{(currentPage - 1) * itemsPerPage + i + 1}}</td>
          <td>{{ d.doctorcode }}</td>
          <td *ngIf="d.first_name">{{ d.first_name + " " + d.last_name }}</td>
          <td *ngIf="!d.first_name"></td>
          <td>
            <div class = "btn-group">
            <button class="btn btn-primary"
                    [routerLink]="['/Docs/Update',d.doctorid!]">
            <i class="bi bi-pencil-square"></i>
            </button>


            <button class="btn btn-outline-danger btn-sm"
                    (click)="openDeleteModal(d.doctorid!)"
                    aria-label="Delete">
                    <i class="bi bi-trash"></i>
            </button>
            </div>
          </td>
        </tr>   
      </tbody>

    </table>


<!-- Loading Spinner -->
  </div>

      <div class="d-flex justify-content-center mt-3" *ngIf="loading">
      <div class="text-center">
      <div class="spinner-grow text-primary"></div>
      <div class="text-muted mt-2">Fetching Data</div>
  </div>
</div>
<!-- Loading Spinner -->

</div>
<!-- Doctor Table -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Pagination -->
<nav class="d-flex justify-content-center mt-3">
  <ul class="pagination">

    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link"
              (click)="changePage(currentPage - 1)">
        <span aria-hidden="true">&laquo;</span>
        <span class="sr-only"></span>
      </button>
    </li>

    <li class="page-item"
        *ngFor="let page of totalPages"
        [class.active]="page === currentPage">

      <button class="page-link"
              (click)="changePage(page)">
        {{ page }}
      </button>

    </li>

    <li class="page-item"
        [class.disabled]="currentPage === totalPages.length">
      <button class="page-link"
              (click)="changePage(currentPage + 1)">
        <span aria-hidden="true">&raquo;</span>
        <span class="sr-only"></span>
      </button>
    </li>

  </ul>
</nav>
<!-- Pagination -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Delete Modal -->
<app-modal
    [title]="'Delete Doctor'"
    [message]="'Are you sure you want to delete this doctor?'"
    (confirm)="DeleteDoctor()">
</app-modal>
<!-- Delete Modal -->
  <!-- ------------------------------------ -->
