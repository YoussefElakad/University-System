<div class="page">

  <h2 class="title">Faculties</h2>

  <!-- ------------------------------------ -->
<!-- Filter + Add -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-3">
  <!-- Faculty Filter -->
  <div class="d-flex justify-content-center mb-3">
  <div style="width: 300px;">
    <input
      type="text"
      class="form-control student-search"
      placeholder="Search by faculty name..."
      [(ngModel)]="facultyFilter"
      (ngModelChange)="currentPage = 1">
  </div>
</div>
<!-- Faculty Filter -->

<!-- Add Button -->
   <div class="d-flex justify-content-center mb-3">
  <div style="width: 50px;">
    <button
      class="btn btn-outline-success btn-sm"
      placeholder="Search by student name..."
      routerLink="/Facs/Add">
      <i class="bi bi-plus"></i>
    </button>
  </div>
</div>
<!-- Add Button -->
 </div>
 <!-- Filter + Add -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Table -->
  <div class="table-wrapper">

    <table class="table">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>Name</th>
          <th>Number Of Levels</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let f of paginatedFaculties; let i = index">
          <td>{{(currentPage - 1) * itemsPerPage + i + 1}}</td>
          <td>{{ f.facultyid }}</td>
          <td>{{ f.facultyname }}</td>
          <td>{{ f.numlevels }}</td>
          <td>
            <div class = "btn-group">
            <button class="btn btn-primary"
                    [routerLink]="['/Facs/Update',f.facultyid!]">
            <i class="bi bi-pencil-square"></i>
            </button>


            <button class="btn btn-outline-danger btn-sm"
                    (click)="openDeleteModal(f.facultyid!)"
                    aria-label="Delete">
                    <i class="bi bi-trash"></i>
            </button>
            </div>
          </td>
        </tr>   
      </tbody>

    </table>


<!-- Loading Spinner -->
  </div>

      <div class="d-flex justify-content-center mt-3" *ngIf="loading">
      <div class="text-center">
      <div class="spinner-grow text-primary"></div>
      <div class="text-muted mt-2">Fetching Data</div>
  </div>
</div>
<!-- Loading Spinner -->

</div>
<!-- Table -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Pagination -->
<nav class="d-flex justify-content-center mt-3">
  <ul class="pagination">

    <li class="page-item" [class.disabled]="currentPage === 1">
      <button class="page-link"
              (click)="changePage(currentPage - 1)">
        <span aria-hidden="true">&laquo;</span>
        <span class="sr-only"></span>
      </button>
    </li>

    <li class="page-item"
        *ngFor="let page of totalPages"
        [class.active]="page === currentPage">

      <button class="page-link"
              (click)="changePage(page)">
        {{ page }}
      </button>

    </li>

    <li class="page-item"
        [class.disabled]="currentPage === totalPages.length">
      <button class="page-link"
              (click)="changePage(currentPage + 1)">
        <span aria-hidden="true">&raquo;</span>
        <span class="sr-only"></span>
      </button>
    </li>

  </ul>
</nav>
<!-- Pagination -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Delete Modal -->
<app-modal
    [title]="'Delete Student'"
    [message]="'Are you sure you want to delete this faculty? All Students and courses in it will be removed.'"
    (confirm)="DeleteFaculty()">
</app-modal>
<!-- Delete Modal -->
  <!-- ------------------------------------ -->
