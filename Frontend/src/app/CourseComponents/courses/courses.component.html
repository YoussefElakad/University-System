<div class="page">

  <h2 class="title">Courses</h2>

  <!-- ------------------------------------ -->
<!-- Filters + Add Button-->
<div class="d-flex justify-content-center align-items-center gap-3 mb-3">
<!-- Student Filter -->
  <div class="d-flex justify-content-center mb-3">
  <div style="width: 300px;">
    <input
      type="text"
      class="form-control student-search"
      placeholder="Search by Course name..."
      [(ngModel)]="courseNameFilter"
      (ngModelChange)="currentPage = 1">
  </div>
</div>
<!-- Student Filter -->

<!-- Faculty Filter-->
<div class="d-flex justify-content-center mb-3">
  <div style="width: 300px;">
    <select
      class="form-select faculty-filter"
      [(ngModel)]="facultyFilter"
      (ngModelChange)="currentPage = 1">

      <option value="">All Faculties</option>

      <option *ngFor="let faculty of faculties"
              [value]="faculty.facultyname">
        {{ faculty.facultyname }}
      </option>

    </select>
  </div>
</div>
<!-- Faculty Filter -->

<!-- Add Button -->
   <div class="d-flex justify-content-center mb-3">
  <div style="width: 50px;">
    <button
      class="btn btn-outline-success btn-sm"
      placeholder="Search by student name..."
      routerLink="/Crs/Add">
      <i class="bi bi-plus"></i>
    </button>
  </div>
</div>
<!-- Add Button -->
</div>
<!-- Filters + Add Button-->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Students Table -->
  <div class="table-wrapper">

    <table class="table">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>Name</th>
          <th>Level</th>
          <th>Faculty Name</th>
          <th>Doctor</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let c of filteredCourses; let i = index">
          <td>{{currentPage * itemsPerPage + i + 1}}</td>
          <td>{{ c.courseid }}</td>
          <td>{{ c.coursename }}</td>
          <td>{{ c.level?.levelid }}</td>
          <td>{{ c.faculty.facultyname }}</td>
          <td *ngIf="c.doctor">{{c.doctor.first_name + " " + c.doctor.last_name}}</td>
          <td *ngIf="!c.doctor"></td>
          <td>
            <div class = "btn-group">
            <button class="btn btn-primary"
                    [routerLink]="['/Crs/Update',c.courseid!]">
            <i class="bi bi-pencil-square"></i>
            </button>


            <button class="btn btn-outline-danger btn-sm"
                    (click)="openDeleteModal(c.courseid!)"
                    aria-label="Delete">
                    <i class="bi bi-trash"></i>
            </button>
            </div>
          </td>
        </tr>   
      </tbody>

    </table>


<!-- Loading Spinner -->
  </div>

      <div class="d-flex justify-content-center mt-3" *ngIf="loading">
      <div class="text-center">
      <div class="spinner-grow text-primary"></div>
      <div class="text-muted mt-2">Fetching Data</div>
  </div>
</div>
<!-- Loading Spinner -->

</div>
<!-- Students Table -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Pagination -->
<nav class="d-flex justify-content-center mt-3">
  <ul class="pagination">

    <!-- Previous -->
    <li class="page-item"
        [class.disabled]="currentPage === 0">

      <button class="page-link"
              (click)="changePage(currentPage - 1)">
        &laquo;
      </button>

    </li>

    <!-- Page Numbers -->
    <li class="page-item"
        *ngFor="let page of pages"
        [class.active]="page === currentPage">

      <button class="page-link"
              (click)="changePage(page)">
        {{ page + 1 }}
      </button>

    </li>

    <!-- Next -->
    <li class="page-item"
        [class.disabled]="currentPage === totalpages - 1">

      <button class="page-link"
              (click)="changePage(currentPage + 1)">
        &raquo;
      </button>

    </li>

  </ul>
</nav>
<!-- Pagination -->
  <!-- ------------------------------------ -->

  <!-- ------------------------------------ -->
<!-- Delete Modal -->
<app-modal 
[title]="'Delete Course'"
[message]="'Are you sure you want to delete this course? All students in it will be removed.'"
(confirm)="DeleteCourse()">
</app-modal>
<!-- Delete Modal -->
  <!-- ------------------------------------ -->
