<div class="home-container">

  <div class="hero-card">

    <div class="hero-content">
      <span class="badge-custom">University Management System</span>

      <h1>University Database Portal</h1>

      <p>
        Here you can access the database of our university, browse students,
        faculties, courses, and manage academic information through a simple
        and organized interface.
      </p>
    </div>
    
    <div *ngIf="!isLogged()" 
    class="button-group d-flex justify-content-center">
    <a routerLink="/auth/login" class="btn btn-outline-primary btn-lg">
      Login
    </a>
    <a routerLink="/auth/register" class="btn btn-outline-primary btn-lg">
      Sign Up
    </a>
    </div>

    <div class="image-container">
      <img src="assets/College.jpg" alt="University Campus">
    </div>

  </div>

</div>
