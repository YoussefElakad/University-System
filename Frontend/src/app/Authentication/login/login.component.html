<div class="login-page">

  <div class="login-card card shadow-lg p-4">

    <h3 class="text-center mb-4">{{'LOGIN.WELCOME'|translate}}</h3>

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label class="form-label">{{'LOGIN.USER'|translate}}</label>
        <input
          type="text"
          [(ngModel)]="loginRequest.username"
          name="username"
          class="form-control"
          [placeholder]="'LOGIN.USERBOX'|translate"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">{{'LOGIN.PASSWORD'|translate}}</label>
        <input
          type="password"
          [(ngModel)]="loginRequest.password"
          name="password"
          class="form-control"
          [placeholder]="'LOGIN.PASSWORDBOX'|translate"
        />
      </div>

      <button type="submit" class="btn btn-primary w-100">
        {{'LOGIN.LOGIN'|translate}}
      </button>

    </form>

  </div>

</div>
