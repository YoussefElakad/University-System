<div class="login-page">

  <div class="login-card card shadow-lg p-4">

    <h3 class="text-center mb-4">Welcome</h3>

    <form (ngSubmit)="Register()">

      <div class="mb-3">
        <select
        [(ngModel)]="register.role"
        class="form-select mb-2"
        name = "role">
        <option value="" disabled selected>Select Role</option>
        <option value="STUDENT">
            Student
        </option>
        <option value = "DOCTOR">
            Doctor
        </option>
        </select>
      </div>


      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Code</label>
        <input
          type="text"
          [(ngModel)]="register.code"
          name="name"
          class="form-control"
          placeholder="Insert Your Unique Code"
        />
      </div>


      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">First Name</label>
        <input
          type="text"
          [(ngModel)]="register.first_name"
          name="name"
          class="form-control"
          placeholder="Enter Your First Name"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Last Name</label>
        <input
          type="text"
          [(ngModel)]="register.last_name"
          name="name"
          class="form-control"
          placeholder="Enter Your Last Name"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Age</label>
        <input
          type="number"
          [(ngModel)]="register.age"
          name="name"
          class="form-control"
          placeholder="Enter Your Age"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Email</label>
        <input
          type="text"
          [(ngModel)]="register.email"
          name="name"
          class="form-control"
          placeholder="Enter Your Email"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Address</label>
        <input
          type="text"
          [(ngModel)]="register.address"
          name="name"
          class="form-control"
          placeholder="Enter Your Address"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">User Name</label>
        <input
          type="text"
          [(ngModel)]="register.username"
          name="username"
          class="form-control"
          placeholder="Enter Your Username"
        />
      </div>

      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Password</label>
        <input
          type="password"
          [(ngModel)]="register.password"
          name="password"
          class="form-control"
          placeholder="Enter password"
        />
      </div>
      <div class="mb-3" *ngIf="register.role">
        <label class="form-label">Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="password"
          class="form-control"
          placeholder="Enter password"
        />
      </div>


      <button type="submit" class="btn btn-primary w-100">
        Submit
      </button>

    </form>

  </div>

</div>
